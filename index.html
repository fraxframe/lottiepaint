<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Lottie Paint</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<style>
:root {
  --bg:#1e1f22;
  --bg2:#2b2d30;
  --bg3:#333438;
  --line:#3d3e42;
  --text:#d7d8db;
  --text-dim:#8a8c90;
  --accent:#4d9bf5;
  --accent2:#6ad3ff;
  --panel-scale:1;
}
* {
  box-sizing: border-box;
}
* {
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: var(--line);
  border-radius: 4px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--text-dim);
  background-clip: padding-box;
}
::-webkit-scrollbar-corner {
  background: transparent;
}
html {
  height: 100%;
  overflow: hidden;
}
body {
  margin: 0;
  height: 100vh;
  height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family:
    -apple-system,
    Segoe UI,
    Arial,
    sans-serif;
  font-size: 13px;
  overflow: hidden;
  position: fixed;
  inset: 0;
  width: 100%;
  overscroll-behavior: none;
  touch-action: pan-x pan-y;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  overscroll-behavior: none;
}
#topbar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 8px 12px;
  background: var(--bg2);
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
  row-gap: 6px;
}
#topbar h1 {
  font-size: 14px;
  margin: 0 8px 0 0;
  font-weight: 600;
  color: var(--accent2);
}
.btn {
  background: var(--bg3);
  border: 1px solid var(--line);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
}
#undoRedoBar {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  flex: none;
}
.iconBtn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 30px;
  padding: 0;
}
.iconBtn svg {
  width: 18px;
  height: 18px;
  color: var(--text);
}
.iconBtn:disabled {
  opacity: .35;
  cursor: default;
}
.iconBtn:disabled:hover {
  background: var(--bg3);
  border-color: var(--line);
}
.btn:hover {
  background: #3d3f44;
  border-color: var(--accent);
}
#filters {
  display: flex;
  gap: 10px;
  align-items: center;
}
#filters label,
#linearWrap label {
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 12px;
  user-select: none;
}
#filters input,
#linearWrap input {
  accent-color: var(--accent);
  cursor: pointer;
}
#linearWrap {
  display: flex;
  align-items: center;
  margin-left: 8px;
  padding-left: 12px;
  border-left: 1px solid var(--line);
}
#bgControls {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}
#bgControls span {
  color: var(--text-dim);
  font-size: 12px;
}
.bgOption {
  width: 28px;
  height: 28px;
  padding: 0;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}
.bgOption.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent) inset;
}
#bgColorPicker {
  width: 28px;
  height: 28px;
  border: 1px solid var(--line);
  border-radius: 5px;
  background: none;
  padding: 0;
  cursor: pointer;
}
#bgColorPicker.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}
#editorResizer {
  width: 4px;
  flex: none;
  cursor: col-resize;
  background: var(--line);
  position: relative;
  transition: background .12s;
}
#editorResizer::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 4px;
  height: 34px;
  transform: translate(-50%, -50%);
  border-radius: 3px;
  background: var(--bg);
  border: 1px solid var(--text-dim);
}
#editorResizer::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 2px;
  height: 18px;
  transform: translate(-50%, -50%);
  border-radius: 1px;
  background: var(--text-dim);
}
#editorResizer:hover,
#editorResizer.dragging {
  background: var(--accent);
}
#editorResizer:hover::after,
#editorResizer.dragging::after {
  border-color: var(--accent2);
}
#editorResizer:hover::before,
#editorResizer.dragging::before {
  background: var(--accent2);
}
#main {
  flex: 1;
  display: flex;
  min-height: 0;
}
#panelsRow {
  display: flex;
  min-height: 0;
}
#mobileResizer {
  display: none;
}
#player #undoRedoBar {
  margin: 0;
  padding: 0;
  border-top: none;
}
#treePanel {
  width: 280px;
  background: var(--bg2);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  min-height: 0;
}
#treeHeader {
  padding: 6px 10px;
  border-bottom: 1px solid var(--line);
  color: var(--text-dim);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
#tree {
  flex: 1;
  overflow: auto;
  padding: 4px 0 calc(16px + env(safe-area-inset-bottom)) 0;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
#editorPanel {
  width: 290px;
  flex: none;
  background: var(--bg2);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  padding: 12px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  overflow: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
#editorPanel h2 {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin: 0 0 10px;
}
.empty-hint {
  color: var(--text-dim);
  font-size: 12px;
  line-height: 1.6;
  margin-top: 20px;
}
#centerPanel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
  background: #161719;
}
#viewport {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  min-height: 0;
  min-width: 0;
  overscroll-behavior: contain;
  touch-action: none;
}
#viewport.checker {
  background-image:
    linear-gradient(
      45deg,
      #cfcfcf 25%,
      transparent 25%),
    linear-gradient(
      -45deg,
      #cfcfcf 25%,
      transparent 25%),
    linear-gradient(
      45deg,
      transparent 75%,
      #cfcfcf 75%),
    linear-gradient(
      -45deg,
      transparent 75%,
      #cfcfcf 75%);
  background-size: 24px 24px;
  background-position:
    0 0,
    0 12px,
    12px -12px,
    -12px 0px;
  background-color: #ffffff;
}
#lottieContainer,
#lottieContainerB {
  width: 480px;
  height: 480px;
  max-width: 100%;
  max-height: 100%;
}
#dropHint {
  position: absolute;
  color: var(--text-dim);
  text-align: center;
  pointer-events: none;
  font-size: 13px;
  line-height: 1.6;
}
#player {
  background: var(--bg2);
  border-top: 1px solid var(--line);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
#playBtn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--line);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
#playBtn:hover {
  border-color: var(--accent);
}
#scrub {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--bg3);
  outline: none;
  cursor: pointer;
}
#scrub::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: var(--accent2);
  cursor: pointer;
  box-shadow: 0 0 0 2px #16171980;
}
#frameLabel {
  width: 110px;
  text-align: right;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  font-size: 11px;
}
.row,
.btn,
button,
.swatch,
.stopZone,
.stop,
.astop,
#scrub,
#playBtn,
.gradbar,
input[type=checkbox],
.chainBtn {
  cursor: pointer;
}
.stop.dragging,
.astop.dragging {
  cursor: grabbing;
}
.node {
}
.row {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 6px 3px 4px;
  border-radius: 3px;
  white-space: nowrap;
}
.row:hover {
  background: #333438;
}
.row.selected {
  background: #2b4a6e;
}
.caret {
  width: 12px;
  height: 12px;
  flex: none;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 9px;
  transition: transform .1s;
}
.caret.open {
  transform: rotate(90deg);
}
.caret.hidden {
  visibility: hidden;
}
.icon {
  width: 14px;
  height: 14px;
  flex: none;
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon svg {
  width: 100%;
  height: 100%;
}
.nm {
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
}
.nm.leaf {
  color: var(--text-dim);
}
.swatch {
  width: 16px;
  height: 16px;
  border-radius: 3px;
  border: 1px solid #00000066;
  flex: none;
  margin-left: auto;
}
.catHeader {
  color: var(--text-dim);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 8px 8px 3px;
}
.gradbar-wrap {
  margin-bottom: 14px;
}
.gradToolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.chainBtn {
  background: var(--bg3);
  border: 1px solid var(--line);
  color: var(--text-dim);
  border-radius: 4px;
  padding: 4px 9px;
  font-size: 13px;
}
.deleteStopBtn {
  background: #4a2222;
  border: 1px solid #8a3a3a;
  color: #ff8b8b;
  border-radius: 4px;
  padding: 4px 11px;
  font-size: 14px;
  font-weight: 600;
}
.deleteStopBtn:hover {
  background: #632a2a;
  border-color: #ff6b6b;
  color: #ffb3b3;
}
.chainBtn.active {
  border-color: var(--accent2);
  color: var(--accent2);
  background: #20384a;
}
.gradbar {
  position: relative;
  height: calc(26px * var(--panel-scale));
  border-radius: 4px;
  border: 1px solid var(--line);
  margin: calc(20px * var(--panel-scale)) 8px calc(18px * var(--panel-scale)) 8px;
  user-select: none;
  background-image:
    linear-gradient(
      45deg,
      #3a3b3f 25%,
      transparent 25%),
    linear-gradient(
      -45deg,
      #3a3b3f 25%,
      transparent 25%),
    linear-gradient(
      45deg,
      transparent 75%,
      #3a3b3f 75%),
    linear-gradient(
      -45deg,
      transparent 75%,
      #3a3b3f 75%);
  background-size: 10px 10px;
  background-position:
    0 0,
    0 5px,
    5px -5px,
    -5px 0px;
}
.gradbar-fill {
  position: absolute;
  inset: 0;
  border-radius: 3px;
}
.stopZone {
  position: absolute;
  left: -1px;
  right: -1px;
}
.stopZone.top {
  top: -17px;
  height: 17px;
}
.stopZone.bottom {
  bottom: -15px;
  height: 15px;
}
.stop {
  position: absolute;
  top: 1px;
  width: 14px;
  transform: translateX(-7px);
  display: flex;
  flex-direction: column;
  align-items: center;
  filter: drop-shadow(0 1px 1px #0008);
  touch-action: none;
  user-select: none;
}
.stop .chip {
  width: 12px;
  height: 9px;
  border-radius: 2px 2px 1px 1px;
  border: 1px solid #0006;
  box-sizing: border-box;
}
.stop .arrow {
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 6px solid #ccc;
  margin-top: -1px;
}
.stop.selected .arrow {
  border-top-color: var(--accent2);
}
.stop.selected .chip {
  box-shadow: 0 0 0 1.5px var(--accent2);
}
.astop {
  position: absolute;
  bottom: 1px;
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 10px solid #bbb;
  transform: translateX(-6px);
  touch-action: none;
  user-select: none;
}
.astop.selected {
  border-bottom-color: var(--accent2);
}
.astop.snapped {
  border-bottom-color: #ffd75e;
}
.picker {
  display: flex;
  flex-direction: column;
  gap: 10px;
  user-select: none;
}
#svSquare {
  position: relative;
  width: 100%;
  height: calc(140px * var(--panel-scale));
  border-radius: 4px;
  border: 1px solid var(--line);
  cursor: crosshair;
  touch-action: none;
}
#svThumb {
  position: absolute;
  width: 10px;
  height: 10px;
  border: 2px solid #fff;
  border-radius: 50%;
  box-shadow: 0 0 2px #000;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
#hueSlider {
  position: relative;
  width: 100%;
  height: calc(14px * var(--panel-scale));
  border-radius: 7px;
  touch-action: none;
  background:
    linear-gradient(
      to right,
      #f00 0%,
      #ff0 17%,
      #0f0 33%,
      #0ff 50%,
      #00f 67%,
      #f0f 83%,
      #f00 100%);
}
#hueThumb {
  position: absolute;
  top: -2px;
  width: 10px;
  height: calc(18px * var(--panel-scale));
  border-radius: 3px;
  border: 2px solid #fff;
  box-shadow: 0 0 2px #000;
  transform: translateX(-50%);
  pointer-events: none;
}
#alphaSlider {
  position: relative;
  width: 100%;
  height: calc(14px * var(--panel-scale));
  border-radius: 7px;
  touch-action: none;
  background-image:
    linear-gradient(
      45deg,
      #3a3b3f 25%,
      transparent 25%),
    linear-gradient(
      -45deg,
      #3a3b3f 25%,
      transparent 25%),
    linear-gradient(
      45deg,
      transparent 75%,
      #3a3b3f 75%),
    linear-gradient(
      -45deg,
      transparent 75%,
      #3a3b3f 75%);
  background-size: 8px 8px;
  background-position:
    0 0,
    0 4px,
    4px -4px,
    -4px 0px;
}
#alphaSliderFill {
  position: absolute;
  inset: 0;
  border-radius: 7px;
}
#alphaThumb {
  position: absolute;
  top: -2px;
  width: 10px;
  height: calc(18px * var(--panel-scale));
  border-radius: 3px;
  border: 2px solid #fff;
  box-shadow: 0 0 2px #000;
  transform: translateX(-50%);
  pointer-events: none;
}
.fields {
  display: grid;
  grid-template-columns: 22px minmax(0, 1fr);
  gap: 6px 8px;
  align-items: center;
  font-size: 11px;
  color: var(--text-dim);
}
.fields input[type=number] {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--line);
  color: var(--text);
  border-radius: 3px;
  padding: 3px 5px;
  font-size: 11px;
}
.hexrow {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 2px;
  min-width: 0;
}
.hexrow input {
  flex: 1;
  min-width: 0;
  background: var(--bg3);
  border: 1px solid var(--line);
  color: var(--text);
  border-radius: 3px;
  padding: 4px 6px;
  font-size: 12px;
  text-transform: uppercase;
}
.preview {
  width: calc(36px * var(--panel-scale));
  height: calc(36px * var(--panel-scale));
  border-radius: 4px;
  border: 1px solid var(--line);
  background-image:
    linear-gradient(
      45deg,
      #3a3b3f 25%,
      transparent 25%),
    linear-gradient(
      -45deg,
      #3a3b3f 25%,
      transparent 25%),
    linear-gradient(
      45deg,
      transparent 75%,
      #3a3b3f 75%),
    linear-gradient(
      -45deg,
      transparent 75%,
      #3a3b3f 75%);
  background-size: 10px 10px;
  background-position:
    0 0,
    0 5px,
    5px -5px,
    -5px 0px;
}
.preview-inner {
  width: 100%;
  height: 100%;
  border-radius: 4px;
}
.rowflex {
  display: flex;
  gap: 10px;
  align-items: center;
}
#fileInput {
  display: none;
}
@media (max-width: 820px) {
  #topbar {
    padding: 6px 8px;
    gap: 8px;
  }
  #topbar h1 {
    display: none;
  }
  #main {
    flex-direction: column;
  }
  #centerPanel {
    order: 1;
    flex: 1 1 auto;
    min-height: 0;
  }
  #editorResizer {
    display: none;
  }
  #panelsRow {
    order: 2;
    flex: 0 0 42vh;
    min-height: 160px;
    border-top: 1px solid var(--line);
  }
  #treePanel {
    width: auto;
    flex: 0 0 var(--mtree-w,50%);
  }
  #editorPanel {
    width: auto;
    flex: 1 1 auto;
    min-width: 0;
  }
  #mobileResizer {
    display: block;
    width: 4px;
    flex: none;
    cursor: col-resize;
    background: var(--line);
    position: relative;
    touch-action: none;
    transition: background .12s;
  }
  #mobileResizer::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4px;
    height: 34px;
    transform: translate(-50%, -50%);
    border-radius: 3px;
    background: var(--bg);
    border: 1px solid var(--text-dim);
  }
  #mobileResizer::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 2px;
    height: 18px;
    transform: translate(-50%, -50%);
    border-radius: 1px;
    background: var(--text-dim);
  }
  #mobileResizer:hover,
  #mobileResizer.dragging {
    background: var(--accent);
  }
  #mobileResizer:hover::after,
  #mobileResizer.dragging::after {
    border-color: var(--accent2);
  }
  #mobileResizer:hover::before,
  #mobileResizer.dragging::before {
    background: var(--accent2);
  }
  #player {
    gap: 8px;
    padding: 8px 10px;
    flex-wrap: nowrap;
  }
  #frameLabel {
    width: auto;
    min-width: 0;
    font-size: 10px;
  }
  #player #undoRedoBar {
    display: flex;
    gap: 6px;
    flex: none;
    order: 3;
  }
  #player #undoRedoBar .iconBtn {
    width: 28px;
    height: 28px;
  }
  #player #scrub {
    order: 2;
  }
  #player #playBtn {
    order: 1;
  }
  #player #frameLabel {
    order: 4;
  }
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>Lottie Paint</h1>
    <button class="btn" id="openBtn">Открыть файл</button>
    <button class="btn" id="exportJsonBtn">Экспорт JSON</button>
    <button class="btn" id="exportTgsBtn">Экспорт TGS</button>
    <input type="file" id="fileInput">
    <div id="filters">
      <span style="color:var(--text-dim)">Показать:</span>
      <label><input type="checkbox" data-f="gfill" checked> Gradient</label>
      <label><input type="checkbox" data-f="gstroke" checked> Gradient Stroke</label>
      <label><input type="checkbox" data-f="stroke" checked> Stroke</label>
      <label><input type="checkbox" data-f="fill" checked> Fill</label>
    </div>
    <div id="linearWrap">
      <label><input type="checkbox" id="linearMode"> Линейный режим</label>
      <label style="margin-left:10px"><input type="checkbox" id="highlightSelected"> Подсвечивать выбранный элемент</label>
    </div>
    <div id="bgControls">

  }
  function hsvToRgb(h, s, v) {
    const c = v * s, x = c * (1 - Math.abs(h / 60 % 2 - 1)), m = v - c;
    let r = 0, g = 0, b = 0;
    if (h < 60) {
      r = c;
      g = x;
      b = 0;
    } else if (h < 120) {
      r = x;
      g = c;
      b = 0;
    } else if (h < 180) {
      r = 0;
      g = c;
      b = x;
    } else if (h < 240) {
      r = 0;
      g = x;
      b = c;
    } else if (h < 300) {
      r = x;
      g = 0;
      b = c;
    } else {
      r = c;
      g = 0;
      b = x;
    }
    return [(r + m) * 255, (g + m) * 255, (b + m) * 255];
  }
  function getGradientStatic(g) {
    if (!g || !g.k) return null;
    if (Array.isArray(g.k.k) && typeof g.k.k[0] === "number") return g.k.k;
    if (Array.isArray(g.k.k) && g.k.k[0] && g.k.k[0].s) return g.k.k[0].s;
    return null;
  }
  function setGradientStatic(g, arr) {
    if (!g || !g.k) return;
    if (Array.isArray(g.k.k) && typeof g.k.k[0] === "number") {
      g.k.k.length = 0;
      for (let i = 0; i < arr.length; i++) g.k.k.push(arr[i]);
    } else if (Array.isArray(g.k.k)) {
      for (const kf of g.k.k) {
        if (kf.s) {
          kf.s.length = 0;
          for (let i = 0; i < arr.length; i++) kf.s.push(arr[i]);
        }
        if (kf.e) {
          kf.e.length = 0;
          for (let i = 0; i < arr.length; i++) kf.e.push(arr[i]);
        }
      }
    }
  }
  function parseGradientStops(g) {
    const arr = getGradientStatic(g);
    const p = g.p || Math.floor(arr.length / 4);
    const colorStops = [];
    for (let i = 0; i < p; i++) {
      const off = i * 4;
      colorStops.push({ offset: arr[off], r: arr[off + 1] * 255, g: arr[off + 2] * 255, b: arr[off + 3] * 255 });
    }
    const alphaStops = [];
    const alphaStart = p * 4;
    const remaining = arr.length - alphaStart;
    if (remaining > 0) {
      const count = Math.floor(remaining / 2);
      for (let i = 0; i < count; i++) {

      }

  }
  function writeGradientStops(g, parsed) {
    const arr = [];
    const sortedColor = parsed.colorStops.slice().sort((a, b) => a.offset - b.offset);
    for (const s of sortedColor) {
      const off = clampNum(s.offset, 0, 1, 0);
      arr.push(off, clampNum(s.r, 0, 255, 255) / 255, clampNum(s.g, 0, 255, 255) / 255, clampNum(s.b, 0, 255, 255) / 255);
    }
    const sortedAlpha = parsed.alphaStops.slice().sort((a, b) => a.offset - b.offset);
    for (const a of sortedAlpha) {

    }

    setGradientStatic(g, arr);
  }
  function gradientToCssPreview(g) {
    try {
      const parsed = parseGradientStops(g);
      const stops = parsed.colorStops.slice().sort((a, b) => a.offset - b.offset).map((s) => "rgb(" + Math.round(s.r) + "," + Math.round(s.g) + "," + Math.round(s.b) + ") " + s.offset * 100 + "%");
      return "linear-gradient(90deg," + stops.join(",") + ")";
    } catch (e) {
      return "#888";
    }
  }
  function renderEditor() {
    editorBody.innerHTML = "";
    if (!currentSelection) {
      editorBody.innerHTML = "";
      return;
    }
    if (currentSelection.kind === "color") {
      renderColorEditor(currentSelection.ref);
    } else {
      renderGradientEditor(currentSelection.ref);
    }
  }
  function refreshSwatches() {
    for (const item of itemRowsList) {
      updateSwatch(item.sw, item.type, item.ref);
    }
  }
  function renderColorEditor(ref) {
    const rgba = getStaticOrFirstColor(ref.c);
    const wrap = document.createElement("div");
    wrap.className = "picker";
    const previewRow = document.createElement("div");
    previewRow.className = "rowflex";
    const prev = document.createElement("div");
    prev.className = "preview";
    const prevInner = document.createElement("div");
    prevInner.className = "preview-inner";
    prev.appendChild(prevInner);
    previewRow.appendChild(prev);
    const label = document.createElement("div");
    label.textContent = ref.nm || (ref.ty === "fl" ? "Fill Color" : "Stroke Color");
    label.style.color = "var(--text-dim)";
    previewRow.appendChild(label);
    wrap.appendChild(previewRow);
    const picker = buildColorPicker(rgba, (newRgba, final) => {
      beginEditSession();
      setStaticColor(ref.c, newRgba);
      prevInner.style.background = colorArrToCss(newRgba);
      if (final) {
        applyChangeAndRefresh();
        refreshSwatches();
        endEditSession();
      } else {
        scheduleRefresh();
      }
    });
    prevInner.style.background = colorArrToCss(rgba);
    wrap.appendChild(picker);
    editorBody.appendChild(wrap);
  }
  function buildColorPicker(initialRgba, onChange) {
    const wrap = document.createElement("div");
    wrap.className = "picker";
    let [r, g, b] = [initialRgba[0] * 255, initialRgba[1] * 255, initialRgba[2] * 255];
    let a = initialRgba.length > 3 ? initialRgba[3] : 1;
    let [h, s, v] = rgbToHsv(r, g, b);
    const sv = document.createElement("div");
    sv.id = "svSquare";
    const svThumb = document.createElement("div");
    svThumb.id = "svThumb";
    sv.appendChild(svThumb);
    wrap.appendChild(sv);
    const hue = document.createElement("div");
    hue.id = "hueSlider";
    const hueThumb = document.createElement("div");
    hueThumb.id = "hueThumb";
    hue.appendChild(hueThumb);
    wrap.appendChild(hue);
    const alphaSlider = document.createElement("div");
    alphaSlider.id = "alphaSlider";
    const alphaFill = document.createElement("div");
    alphaFill.id = "alphaSliderFill";
    const alphaThumb = document.createElement("div");
    alphaThumb.id = "alphaThumb";
    alphaSlider.appendChild(alphaFill);
    alphaSlider.appendChild(alphaThumb);
    wrap.appendChild(alphaSlider);
    const hexRow = document.createElement("div");
    hexRow.className = "hexrow";
    const hexInput = document.createElement("input");
    hexInput.type = "text";
    hexRow.innerHTML = '<span style="color:var(--text-dim)">#</span>';
    hexRow.appendChild(hexInput);
    wrap.appendChild(hexRow);
    const fields = document.createElement("div");
    fields.className = "fields";
    function makeField(labelTxt, value, max, onInput) {
      const l = document.createElement("div");
      l.textContent = labelTxt;
      const i = document.createElement("input");
      i.type = "number";
      i.min = 0;
      i.max = max;
      i.value = Math.round(value);
      i.addEventListener("change", () => onInput(Number(i.value)));
      fields.appendChild(l);
      fields.appendChild(i);
      return i;
    }
    const rField = makeField("R", r, 255, (val) => {
      r = clampNum(val, 0, 255, r);
      syncFromRgb(true);
    });
    const gField = makeField("G", g, 255, (val) => {
      g = clampNum(val, 0, 255, g);
      syncFromRgb(true);
    });
    const bField = makeField("B", b, 255, (val) => {
      b = clampNum(val, 0, 255, b);
      syncFromRgb(true);
    });
    const aField = makeField("A", a * 100, 100, (val) => {
      a = clampNum(val, 0, 100, a * 100) / 100;
      renderAll(false);
      fire(true);
    });
    wrap.appendChild(fields);
    function syncFromRgb(final) {
      [h, s, v] = rgbToHsv(r, g, b);
      renderAll(true);
      fire(final);
    }
    function fire(final) {
      onChange([r / 255, g / 255, b / 255, a], final);
    }
    function renderAll(updateFields) {
      sv.style.background = "linear-gradient(to top, #000, transparent), linear-gradient(to right, #fff, hsl(" + h + ",100%,50%))";
      svThumb.style.left = s * 100 + "%";
      svThumb.style.top = (1 - v) * 100 + "%";
      hueThumb.style.left = h / 360 * 100 + "%";
      const rgbNow = hsvToRgb(h, s, v);
      alphaFill.style.background = "linear-gradient(to right, rgba(" + Math.round(rgbNow[0]) + "," + Math.round(rgbNow[1]) + "," + Math.round(rgbNow[2]) + ",0), rgb(" + Math.round(rgbNow[0]) + "," + Math.round(rgbNow[1]) + "," + Math.round(rgbNow[2]) + "))";
      alphaThumb.style.left = a * 100 + "%";
      hexInput.value = rgbToHex(r, g, b).replace("#", "");
      if (updateFields) {
        rField.value = Math.round(r);
        gField.value = Math.round(g);
        bField.value = Math.round(b);
      }
      aField.value = Math.round(a * 100);
    }
    renderAll(true);
    let svRect = null;
    function svPointer(e, final) {
      let x = (e.clientX - svRect.left) / svRect.width;
      x = Math.max(0, Math.min(1, x));
      let y = (e.clientY - svRect.top) / svRect.height;
      y = Math.max(0, Math.min(1, y));
      s = x;
      v = 1 - y;
      const rgb = hsvToRgb(h, s, v);
      r = rgb[0];
      g = rgb[1];
      b = rgb[2];
      renderAll(true);
      fire(final);
    }
    let draggingSv = false;
    sv.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      sv.setPointerCapture(e.pointerId);
      draggingSv = true;
      svRect = sv.getBoundingClientRect();
      svPointer(e, false);
      hoverItem = null;
      clearHoverClone();
    });
    sv.addEventListener("pointermove", (e) => {
      if (draggingSv) svPointer(e, false);
    });
    sv.addEventListener("pointerup", (e) => {
      if (draggingSv) {
        svPointer(e, true);
        draggingSv = false;
      }
    });
    sv.addEventListener("pointercancel", (e) => {
      if (draggingSv) {
        svPointer(e, true);
        draggingSv = false;
      }
    });
    let draggingHue = false;
    let hueRect = null;
    function huePointer(e, final) {
      let x = (e.clientX - hueRect.left) / hueRect.width;
      x = Math.max(0, Math.min(1, x));
      h = x * 360;
      const rgb = hsvToRgb(h, s, v);
      r = rgb[0];
      g = rgb[1];
      b = rgb[2];
      renderAll(true);
      fire(final);
    }
    hue.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      hue.setPointerCapture(e.pointerId);
      draggingHue = true;
      hueRect = hue.getBoundingClientRect();
      huePointer(e, false);
      hoverItem = null;
      clearHoverClone();
    });
    hue.addEventListener("pointermove", (e) => {
      if (draggingHue) huePointer(e, false);
    });
    hue.addEventListener("pointerup", (e) => {
      if (draggingHue) {
        huePointer(e, true);
        draggingHue = false;
      }
    });
    hue.addEventListener("pointercancel", (e) => {
      if (draggingHue) {
        huePointer(e, true);
        draggingHue = false;
      }
    });
    let draggingAlpha = false;
    let alphaRect = null;
    function alphaPointer(e, final) {
      let x = (e.clientX - alphaRect.left) / alphaRect.width;
      x = Math.max(0, Math.min(1, x));
      a = x;
      renderAll(false);
      fire(final);
    }
    alphaSlider.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      alphaSlider.setPointerCapture(e.pointerId);
      draggingAlpha = true;
      alphaRect = alphaSlider.getBoundingClientRect();
      alphaPointer(e, false);
      hoverItem = null;
      clearHoverClone();
    });
    alphaSlider.addEventListener("pointermove", (e) => {
      if (draggingAlpha) alphaPointer(e, false);
    });
    alphaSlider.addEventListener("pointerup", (e) => {
      if (draggingAlpha) {
        alphaPointer(e, true);
        draggingAlpha = false;
      }
    });
    alphaSlider.addEventListener("pointercancel", (e) => {
      if (draggingAlpha) {
        alphaPointer(e, true);
        draggingAlpha = false;
      }
    });
    hexInput.addEventListener("change", () => {
      const rgb = hexToRgb(hexInput.value);
      if (!rgb) {
        hexInput.value = rgbToHex(r, g, b).replace("#", "");
        return;
      }
      r = rgb[0];
      g = rgb[1];
      b = rgb[2];
      syncFromRgb(true);
    });
    return wrap;
  }
  function renderGradientEditor(ref) {
    const parsed = parseGradientStops(ref.g);
    let selectedColorIdx = 0;
    let selectedIsAlpha = false;
    let selectedAlphaIdx = -1;
    let chainLinked = true;
    const wrap = document.createElement("div");
    wrap.className = "gradbar-wrap";
    const title = document.createElement("div");
    title.textContent = ref.nm || (ref.ty === "gf" ? "Gradient Fill" : "Gradient Stroke");
    title.style.color = "var(--text-dim)";
    title.style.marginBottom = "6px";
    wrap.appendChild(title);
    const toolbar = document.createElement("div");
    toolbar.className = "gradToolbar";
    const chainBtn = document.createElement("button");
    chainBtn.className = "chainBtn active";
    chainBtn.textContent = "\u{1F517}";
    chainBtn.title = "\u041F\u0440\u0438\u043C\u0430\u0433\u043D\u0438\u0447\u0438\u0432\u0430\u0442\u044C \u0441\u0442\u043E\u043F\u044B \u043F\u0440\u043E\u0437\u0440\u0430\u0447\u043D\u043E\u0441\u0442\u0438 \u043A \u0441\u0442\u043E\u043F\u0430\u043C \u0446\u0432\u0435\u0442\u0430";
    chainBtn.addEventListener("click", () => {
      chainLinked = !chainLinked;
      chainBtn.classList.toggle("active", chainLinked);
    });
    const deleteBtn = document.createElement("button");
    deleteBtn.className = "deleteStopBtn";
    deleteBtn.textContent = "\u{1F5D1} \u0423\u0434\u0430\u043B\u0438\u0442\u044C \u0441\u0442\u043E\u043F";
    deleteBtn.title = "\u0423\u0434\u0430\u043B\u0438\u0442\u044C \u0432\u044B\u0431\u0440\u0430\u043D\u043D\u044B\u0439 \u0441\u0442\u043E\u043F";
    deleteBtn.addEventListener("click", () => deleteSelected());
    toolbar.appendChild(deleteBtn);
    toolbar.appendChild(chainBtn);
    wrap.appendChild(toolbar);
    const bar = document.createElement("div");
    bar.className = "gradbar";
    const fillDiv = document.createElement("div");
    fillDiv.className = "gradbar-fill";
    bar.appendChild(fillDiv);
    const topZone = document.createElement("div");
    topZone.className = "stopZone top";
    const bottomZone = document.createElement("div");
    bottomZone.className = "stopZone bottom";
    bar.appendChild(topZone);
    bar.appendChild(bottomZone);
    wrap.appendChild(bar);
    const pickerHolder = document.createElement("div");
    wrap.appendChild(pickerHolder);
    editorBody.appendChild(wrap);
    function currentRgba() {
      if (selectedIsAlpha) {
        const a = parsed.alphaStops[selectedAlphaIdx];
        return [1, 1, 1, a ? a.alpha : 1];
      }
      const c = parsed.colorStops[selectedColorIdx];
      return [c.r / 255, c.g / 255, c.b / 255, 1];
    }
    function nearestColorRgb(offset) {
      let best = null, bestDist = Infinity;
      for (const c of parsed.colorStops) {
        const d = Math.abs(c.offset - offset);
        if (d < bestDist) {
          bestDist = d;
          best = c;
        }
      }
      return best;
    }
    function redrawBar() {
      const sortedColor = parsed.colorStops.slice().sort((a, b) => a.offset - b.offset);
      const stops = sortedColor.map((s) => "rgb(" + Math.round(s.r) + "," + Math.round(s.g) + "," + Math.round(s.b) + ") " + s.offset * 100 + "%");
      fillDiv.style.background = "linear-gradient(90deg," + stops.join(",") + ")";
      topZone.querySelectorAll(".stop").forEach((n) => n.remove());
      bottomZone.querySelectorAll(".astop").forEach((n) => n.remove());
      parsed.colorStops.forEach((s, i) => {
        const el = document.createElement("div");
        el.className = "stop" + (!selectedIsAlpha && i === selectedColorIdx ? " selected" : "");
        el.style.left = s.offset * 100 + "%";
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.style.background = "rgb(" + Math.round(s.r) + "," + Math.round(s.g) + "," + Math.round(s.b) + ")";
        el.appendChild(chip);
        const arrow = document.createElement("div");
        arrow.className = "arrow";
        el.appendChild(arrow);
        el.addEventListener("pointerdown", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          selectedColorIdx = i;
          selectedIsAlpha = false;
          redrawPicker();
          redrawBar();
          const freshEl = topZone.children[i];
          startDragStop(freshEl, i, "color", ev.pointerId, ev.clientX, ev.clientY);
        });
        topZone.appendChild(el);
      });
      parsed.alphaStops.forEach((s, i) => {
        const el = document.createElement("div");
        el.className = "astop" + (selectedIsAlpha && i === selectedAlphaIdx ? " selected" : "");
        el.style.left = s.offset * 100 + "%";
        el.title = "Opacity: " + Math.round(s.alpha * 100) + "%";
        el.addEventListener("pointerdown", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          selectedAlphaIdx = i;
          selectedIsAlpha = true;
          redrawPicker();
          redrawBar();
          const freshEl = bottomZone.children[i];
          startDragStop(freshEl, i, "alpha", ev.pointerId, ev.clientX, ev.clientY);
        });
        bottomZone.appendChild(el);
      });
    }
    function startDragStop(el, idx, kind, pointerId, downX, downY) {
      el.classList.add("dragging");
      hoverItem = null;
      clearHoverClone();
      const rect = bar.getBoundingClientRect();
      const CLICK_THRESHOLD = 4;
      let moved = false;
      function applyPosition(e) {
        let x = (e.clientX - rect.left) / rect.width;
        x = Math.max(0, Math.min(1, x));
        if (kind === "color") {
          parsed.colorStops[idx].offset = Math.round(x * 1e3) / 1e3;
        } else {
          if (chainLinked) {
            for (const c of parsed.colorStops) {
              if (Math.abs(x - c.offset) < 0.02) {
                x = c.offset;
                el.classList.add("snapped");
                break;
              }
              el.classList.remove("snapped");
            }
          } else {
            el.classList.remove("snapped");
          }
          parsed.alphaStops[idx].offset = Math.round(x * 1e3) / 1e3;
        }
        el.style.left = x * 100 + "%";
      }
      function move(e) {
        if (!moved) {
          if (Math.abs(e.clientX - downX) < CLICK_THRESHOLD && Math.abs(e.clientY - downY) < CLICK_THRESHOLD) return;
          moved = true;
        }
        applyPosition(e);
        commit(false);
      }
      function end(e) {
        if (moved) applyPosition(e);
        el.classList.remove("dragging");
        el.removeEventListener("pointermove", move);
        el.removeEventListener("pointerup", end);
        el.removeEventListener("pointercancel", end);
        try {
          el.releasePointerCapture(pointerId);
        } catch (err) {
        }
        commit(true);
      }
      try {
        el.setPointerCapture(pointerId);
      } catch (err) {
      }
      el.addEventListener("pointermove", move);
      el.addEventListener("pointerup", end);
      el.addEventListener("pointercancel", end);
    }
    topZone.addEventListener("mousedown", (e) => {
      if (e.target !== topZone) return;
      e.preventDefault();
      const rect = bar.getBoundingClientRect();
      let x = (e.clientX - rect.left) / rect.width;
      x = Math.max(0, Math.min(1, x));
      const nearest = nearestColorRgb(x) || { r: 255, g: 255, b: 255 };
      parsed.colorStops.push({ offset: x, r: nearest.r, g: nearest.g, b: nearest.b });
      selectedColorIdx = parsed.colorStops.length - 1;
      selectedIsAlpha = false;
      commit(true);
    });
    bottomZone.addEventListener("mousedown", (e) => {
      if (e.target !== bottomZone) return;
      e.preventDefault();
      const rect = bar.getBoundingClientRect();
      let x = (e.clientX - rect.left) / rect.width;
      x = Math.max(0, Math.min(1, x));
      parsed.alphaStops.push({ offset: x, alpha: 1 });
      selectedAlphaIdx = parsed.alphaStops.length - 1;
      selectedIsAlpha = true;
      commit(true);
    });
    function deleteSelected() {
      if (selectedIsAlpha) {
        if (selectedAlphaIdx >= 0) {
          parsed.alphaStops.splice(selectedAlphaIdx, 1);
          selectedIsAlpha = false;
          selectedColorIdx = Math.min(selectedColorIdx, parsed.colorStops.length - 1);
          commit(true);
        }
      } else if (parsed.colorStops.length > 2) {
        parsed.colorStops.splice(selectedColorIdx, 1);
        selectedColorIdx = Math.max(0, selectedColorIdx - 1);
        commit(true);
      }
    }
    function keyHandler(e) {
      if (!wrap.isConnected) {
        window.removeEventListener("keydown", keyHandler);
        return;
      }
      const tag = document.activeElement && document.activeElement.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA") return;
      if (e.key === "Delete" || e.key === "Backspace") {
        e.preventDefault();
        deleteSelected();
      }
    }
    window.addEventListener("keydown", keyHandler);
    let colorPickerEl = null;
    function redrawPicker() {
      if (colorPickerEl) colorPickerEl.remove();
      colorPickerEl = buildColorPicker(currentRgba(), (rgba, final) => {
        if (selectedIsAlpha) {
          if (selectedAlphaIdx >= 0) parsed.alphaStops[selectedAlphaIdx].alpha = rgba[3];
        } else {
          parsed.colorStops[selectedColorIdx].r = rgba[0] * 255;
          parsed.colorStops[selectedColorIdx].g = rgba[1] * 255;
          parsed.colorStops[selectedColorIdx].b = rgba[2] * 255;
        }
        commit(final);
      });
      pickerHolder.appendChild(colorPickerEl);
    }
    function updateFillOnly() {
      const sortedColor = parsed.colorStops.slice().sort((a, b) => a.offset - b.offset);
      const stops = sortedColor.map((s) => "rgb(" + Math.round(s.r) + "," + Math.round(s.g) + "," + Math.round(s.b) + ") " + s.offset * 100 + "%");
      fillDiv.style.background = "linear-gradient(90deg," + stops.join(",") + ")";
    }
    function commit(final) {
      beginEditSession();
      writeGradientStops(ref.g, parsed);
      if (final) {
        redrawBar();
        applyChangeAndRefresh();
        refreshSwatches();
        endEditSession();
      } else {
        updateFillOnly();
        scheduleRefresh();
      }
    }
    redrawBar();
    redrawPicker();
  }
})();
</script>
